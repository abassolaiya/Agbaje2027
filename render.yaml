services:
  - type: web
    name: agbaje-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://your-backend-url.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html